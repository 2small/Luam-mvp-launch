<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reflection Space - Luam Wellness</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Livvic:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="modern-styles.css">
    <link rel="stylesheet" href="design-tokens.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #F8F9FA 0%, #F5F5F0 100%);
            color: #2F3E46;
            min-height: 100vh;
            opacity: 0;
            animation: fadeIn 0.5s ease-in forwards;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        header {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(135, 169, 107, 0.2);
            padding: 1rem 2rem;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .header-content {
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .header-title {
            font-family: 'Livvic', serif;
            font-size: 1.5rem;
            font-weight: 600;
            color: #2F3E46;
        }

        .header-title span {
            color: #87A96B;
        }

        .back-btn {
            background: rgba(135, 169, 107, 0.1);
            border: 1px solid #87A96B;
            color: #87A96B;
            padding: 0.5rem 1rem;
            border-radius: 8px;
            text-decoration: none;
            font-family: 'Inter', sans-serif;
            font-weight: 500;
            transition: all 0.3s ease;
        }

        .back-btn:hover {
            background: #87A96B;
            color: white;
            transform: translateY(-2px);
        }

        main {
            max-width: 1000px;
            margin: 2rem auto;
            padding: 0 2rem;
        }

        .reflection-container {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(135, 169, 107, 0.2);
            border-radius: 16px;
            padding: 2rem;
            box-shadow: 0 4px 20px rgba(135, 169, 107, 0.1);
        }

        .reflection-header {
            margin-bottom: 1.5rem;
        }

        .reflection-header h1 {
            font-family: 'Livvic', serif;
            font-size: 2rem;
            font-weight: 600;
            color: #2F3E46;
            margin-bottom: 0.5rem;
        }

        .reflection-header p {
            color: #64748b;
            font-size: 0.875rem;
        }

        .journal-editor {
            width: 100%;
            min-height: 60vh;
            padding: 1.5rem;
            border: 1px solid #E9ECEF;
            border-radius: 12px;
            font-family: 'Inter', sans-serif;
            font-size: 1rem;
            line-height: 1.8;
            color: #2F3E46;
            resize: none;
            transition: all 0.3s ease;
        }

        .journal-editor:focus {
            outline: none;
            border-color: #87A96B;
            box-shadow: 0 0 0 3px rgba(135, 169, 107, 0.1);
        }

        .editor-toolbar {
            display: flex;
            gap: 1rem;
            margin-bottom: 1rem;
            flex-wrap: wrap;
        }

        .toolbar-btn {
            background: rgba(135, 169, 107, 0.1);
            border: 1px solid #87A96B;
            color: #87A96B;
            padding: 0.5rem 1rem;
            border-radius: 8px;
            cursor: pointer;
            font-family: 'Inter', sans-serif;
            font-weight: 500;
            transition: all 0.3s ease;
        }

        .toolbar-btn:hover {
            background: #87A96B;
            color: white;
        }

        .save-btn {
            background: #87A96B;
            color: white;
            border: none;
            padding: 0.75rem 1.5rem;
            border-radius: 8px;
            font-family: 'Inter', sans-serif;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 1rem;
        }

        .save-btn:hover {
            background: #6B8F5A;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(135, 169, 107, 0.3);
        }

        .word-count {
            text-align: right;
            color: #64748b;
            font-size: 0.875rem;
            margin-top: 0.5rem;
        }

        @media (max-width: 768px) {
            main {
                padding: 0 1rem;
                margin: 1rem auto;
            }

            .reflection-container {
                padding: 1.5rem;
            }

            .reflection-header h1 {
                font-size: 1.5rem;
            }

            .journal-editor {
                min-height: 50vh;
                padding: 1rem;
            }
        }
    </style>
</head>
<body>
    <header>
        <div class="header-content">
            <h1 class="header-title">Reflection <span>Space</span></h1>
            <a href="dashboard.html" class="back-btn">← Back to Dashboard</a>
        </div>
    </header>

    <main>
        <div class="reflection-container">
            <div class="reflection-header">
                <h1>Your Journal</h1>
                <p>A quiet space for deep reflection and self-discovery</p>
            </div>

            <div class="editor-toolbar">
                <button class="toolbar-btn" onclick="insertDate()">Insert Date</button>
                <button class="toolbar-btn" onclick="insertTime()">Insert Time</button>
                <button class="toolbar-btn" onclick="clearEditor()">Clear</button>
            </div>

            <textarea id="journalEditor" class="journal-editor" placeholder="Begin writing your reflection here..."></textarea>
            <div class="word-count"><span id="wordCount">0</span> words</div>
            
            <button class="save-btn" onclick="saveJournal()">Save Reflection</button>
        </div>
    </main>

    <script>
        const journalEditor = document.getElementById('journalEditor');
        const wordCountDisplay = document.getElementById('wordCount');

        // Update word count
        journalEditor.addEventListener('input', function() {
            const text = this.value.trim();
            const wordCount = text ? text.split(/\s+/).length : 0;
            wordCountDisplay.textContent = wordCount;
        });

        // Insert date
        function insertDate() {
            const date = new Date().toLocaleDateString('en-US', {
                weekday: 'long',
                year: 'numeric',
                month: 'long',
                day: 'numeric'
            });
            insertAtCursor(date + '\n\n');
        }

        // Insert time
        function insertTime() {
            const time = new Date().toLocaleTimeString('en-US', {
                hour: '2-digit',
                minute: '2-digit'
            });
            insertAtCursor(time + ' - ');
        }

        // Insert text at cursor position
        function insertAtCursor(text) {
            const start = journalEditor.selectionStart;
            const end = journalEditor.selectionEnd;
            const value = journalEditor.value;
            
            journalEditor.value = value.substring(0, start) + text + value.substring(end);
            journalEditor.selectionStart = journalEditor.selectionEnd = start + text.length;
            journalEditor.focus();
            
            // Update word count
            journalEditor.dispatchEvent(new Event('input'));
        }

        // Clear editor
        function clearEditor() {
            if (confirm('Are you sure you want to clear your reflection?')) {
                journalEditor.value = '';
                wordCountDisplay.textContent = '0';
            }
        }

        // Save journal
        function saveJournal() {
            const content = journalEditor.value.trim();
            if (!content) {
                alert('Please write something before saving.');
                return;
            }

            // Save to localStorage (can be integrated with PouchDB later)
            const entries = JSON.parse(localStorage.getItem('luam_journal_entries') || '[]');
            entries.unshift({
                id: Date.now(),
                content: content,
                timestamp: new Date().toISOString()
            });
            localStorage.setItem('luam_journal_entries', JSON.stringify(entries));

            alert('Reflection saved successfully!');
            journalEditor.value = '';
            wordCountDisplay.textContent = '0';
        }

        // Load previous entry if exists
        window.addEventListener('load', function() {
            const entries = JSON.parse(localStorage.getItem('luam_journal_entries') || '[]');
            if (entries.length > 0) {
                const lastEntry = entries[0];
                const lastDate = new Date(lastEntry.timestamp);
                const today = new Date();
                
                // Only load if it's from today
                if (lastDate.toDateString() === today.toDateString()) {
                    journalEditor.value = lastEntry.content;
                    journalEditor.dispatchEvent(new Event('input'));
                }
            }
        });

        // Auto-save every 30 seconds
        setInterval(function() {
            const content = journalEditor.value.trim();
            if (content) {
                localStorage.setItem('luam_journal_draft', content);
            }
        }, 30000);

        // Load draft on page load
        window.addEventListener('load', function() {
            const draft = localStorage.getItem('luam_journal_draft');
            if (draft && !journalEditor.value) {
                journalEditor.value = draft;
                journalEditor.dispatchEvent(new Event('input'));
            }
        });
    </script>
</body>
</html>
